<div id="app">
  <nav id="sidebar">
    <div class="sidebar-logo">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
        <circle cx="14" cy="14" r="13" stroke="#4f7cff" stroke-width="1.5"/>
        <circle cx="14" cy="14" r="5" fill="#4f7cff"/>
        <line x1="14" y1="1" x2="14" y2="5" stroke="#4f7cff" stroke-width="1.5"/>
        <line x1="14" y1="23" x2="14" y2="27" stroke="#4f7cff" stroke-width="1.5"/>
        <line x1="1" y1="14" x2="5" y2="14" stroke="#4f7cff" stroke-width="1.5"/>
        <line x1="23" y1="14" x2="27" y2="14" stroke="#4f7cff" stroke-width="1.5"/>
        <circle cx="14" cy="3" r="1.5" fill="#4f7cff"/>
        <circle cx="14" cy="25" r="1.5" fill="#4f7cff"/>
        <circle cx="3" cy="14" r="1.5" fill="#4f7cff"/>
        <circle cx="25" cy="14" r="1.5" fill="#4f7cff"/>
      </svg>
      <div>
        <div class="sidebar-logo-text">ZTNetwork Panel</div>
        <div class="sidebar-logo-sub">ZeroTier UI</div>
      </div>
    </div>

    <nav class="sidebar-nav">

      <!-- NODE -->
      <div class="nav-section">
        <div class="nav-section-label">Node</div>
        <div class="nav-item" data-route="/dashboard" onclick="Router.navigate('/dashboard')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2 2h5v5H2V2zm0 7h5v5H2V9zm7-7h5v5H9V2zm0 7h5v5H9V9z"/></svg>
          Dashboard
        </div>
      </div>

      <!-- MY NETWORKS -->
      <div class="nav-section">
        <div class="nav-section-label">My Networks</div>
        <div class="nav-item" data-route="/networks" onclick="Router.navigate('/networks')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a2 2 0 100 4 2 2 0 000-4zM2 8a2 2 0 100 4 2 2 0 000-4zm12 0a2 2 0 100 4 2 2 0 000-4zM8 4v2M4 10H2v-1a2 2 0 00-2-2m14 3h-2v-1a2 2 0 00-2-2" stroke="currentColor" stroke-width="1.2" fill="none"/></svg>
          Networks
        </div>
      </div>

      <!-- CONTROLLERS -->
      <div class="nav-section">
        <div class="nav-section-label">Controllers</div>
        <div class="nav-item" data-route="/controllers/networks" onclick="Router.navigate('/controllers/networks')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="5" y="9" width="6" height="6" rx="1"/></svg>
          Networks
        </div>
        <div class="nav-item" data-route="/controllers/networks" onclick="Router.navigate('/controllers/networks')" title="Select a network to view members">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="5" r="3"/><path d="M1 14c0-3.3 3.1-6 7-6s7 2.7 7 6H1z"/></svg>
          Members
        </div>
      </div>

      <!-- GATEWAY — collapsible, auto-expands when a feature is active -->
      <div class="nav-section nav-group" id="nav-group-gateway">
        <div class="nav-section-label nav-group-toggle" onclick="NavGroup.toggle('nav-group-gateway')" title="Toggle Gateway section">
          Gateway
          <svg class="nav-group-chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 3.5l3 3 3-3"/></svg>
        </div>
        <div class="nav-group-items">
          <div class="nav-item" data-route="/exitnode" onclick="Router.navigate('/exitnode')">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L15 8l-7 7-1.5-1.5L11 9H1V7h10L6.5 2.5 8 1z"/></svg>
            Exit Node
            <span id="nav-exitnode-badge" class="nav-badge" style="display:none"></span>
          </div>
          <div class="nav-item" data-route="/physnet" onclick="Router.navigate('/physnet')">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 8h14M8 1v14" stroke="currentColor" stroke-width="1.5" fill="none"/><circle cx="8" cy="8" r="3" fill="currentColor"/></svg>
            Phys Routing
            <span id="nav-physnet-badge" class="nav-badge" style="display:none"></span>
          </div>
          <div class="nav-item" data-route="/bridge" onclick="Router.navigate('/bridge')">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M1 10h3V6H1M12 6v4h3M4 8h8M4 6v4M12 6v4" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            L2 Bridge
            <span id="nav-bridge-badge" class="nav-badge" style="display:none"></span>
          </div>
          <div class="nav-item" data-route="/relay" onclick="Router.navigate('/relay')">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2v12M2 8h12M5 5l6 6M11 5l-6 6" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            TCP Relay
            <span id="nav-relay-badge" class="nav-badge" style="display:none"></span>
          </div>
        </div>
      </div>

      <!-- SETTINGS -->
      <div class="nav-section">
        <div class="nav-section-label">Settings</div>
        <div class="nav-item" data-route="/settings/global" onclick="Router.navigate('/settings/global')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 10a2 2 0 100-4 2 2 0 000 4zm0-7c.6 0 1 .4 1 1v.3a5 5 0 011.6.9l.3-.2a1 1 0 011.4 1.4l-.2.3A5 5 0 0113 8c0 .6-.4 1-1 1h-.3a5 5 0 01-.9 1.6l.2.3a1 1 0 01-1.4 1.4l-.3-.2A5 5 0 018 13c-.6 0-1-.4-1-1v-.3A5 5 0 015.4 10.8l-.3.2a1 1 0 01-1.4-1.4l.2-.3A5 5 0 013 8c0-.6.4-1 1-1h.3a5 5 0 01.9-1.6l-.2-.3A1 1 0 016.4 3.7l.3.2A5 5 0 017 4V4c0-.6.4-1 1-1z"/></svg>
          Global
        </div>
        <div class="nav-item" data-route="/settings/ztnode" onclick="Router.navigate('/settings/ztnode')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="3"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.2 3.2l1.4 1.4M11.4 11.4l1.4 1.4M3.2 12.8l1.4-1.4M11.4 4.6l1.4-1.4"/></svg>
          ZeroTier Node
        </div>
        <div class="nav-item" data-route="/settings/roots" onclick="Router.navigate('/settings/roots')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><circle cx="8" cy="8" r="3"/><circle cx="8" cy="8" r="7" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          Root Servers
        </div>
        <div class="nav-item" data-route="/settings/tokens" onclick="Router.navigate('/settings/tokens')">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M10 1a4 4 0 014 4c0 1.7-.8 3.2-2.1 4.1l.1.4V11l-1 1-1-1-1 1-1-1v-1.5l.1-.4A4 4 0 0110 1zM4.5 10l-3 5h5.5v-2h2v2H11L8.5 10"/></svg>
          API Tokens
        </div>
      </div>

    </nav>

    <div class="sidebar-footer">
      <div id="sidebar-zt-status" class="sidebar-zt-dot" title="ZeroTier status"></div>
      <div id="sidebar-version">v{{VERSION}}</div>
    </div>
  </nav>

  <!-- Mobile top bar -->
  <div id="mobile-bar">
    <button id="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle navigation">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="2" y1="5" x2="18" y2="5"/><line x1="2" y1="10" x2="18" y2="10"/><line x1="2" y1="15" x2="18" y2="15"/>
      </svg>
    </button>
    <span class="mobile-bar-title">ZTNetwork Panel</span>
  </div>
  <div id="sidebar-overlay" onclick="closeSidebar()"></div>

  <main id="content">
    <div class="page"><div class="loading-row"><div class="spinner"></div> Loading...</div></div>
  </main>
</div>
<div id="toast-container"></div>
<div id="modal-overlay"></div>
