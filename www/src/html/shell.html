<script>
// Register all routes
Router.on('/dashboard',                      () => { DashboardPage.init(); return DashboardPage; });
Router.on('/peers',                          () => { PeersPage.init(); });
Router.on('/networks',                       () => { NetworksPage.init(); });
Router.on('/networks/:id',                   (p) => NetworkDetailPage.init(p));
Router.on('/controllers/networks',           () => { CtrlNetworksPage.init(); });
Router.on('/controllers/members/:id',        (p) => { CtrlMembersPage.init(p); });
Router.on('/controllers/config/:id',         (p) => { CtrlConfigPage.init(p); });
Router.on('/exitnode',                       () => { ExitnodePage.init(); });
Router.on('/physnet',                        () => { PhysnetPage.init(); });
Router.on('/bridge',                         () => { BridgePage.init(); });
Router.on('/relay',                          () => { RelayPage.init(); });
Router.on('/settings/global',               () => { SettingsGlobalPage.init(); });
Router.on('/settings/roots',               () => { SettingsRootsPage.init(); });
Router.on('/settings/tokens',              () => { SettingsTokensPage.init(); });

// Simple peers page (reuse dashboard data)
const PeersPage = {
  init() {
    const peers = State.get('peers')||[];
    const rows = peers.map(p => `<tr>
      <td class="mono">${p.address}</td>
      <td><span class="badge ${p.role==='PLANET'?'badge-info':p.role==='MOON'?'badge-warn':'badge-muted'}">${p.role}</span></td>
      <td>${p.latency>=0?p.latency+'ms':'—'}</td>
      <td>${p.version||'—'}</td>
      <td>${(p.paths||[]).filter(p=>p.active).length}</td>
    </tr>`).join('');
    document.getElementById('content').innerHTML = `<div class="page">
      <div class="page-header"><h1 class="page-title">Peers</h1></div>
      ${!peers.length?`<div class="empty-state"><div class="empty-state-icon">🤝</div><h3>No peers</h3></div>`
      :`<div class="table-wrap"><table><thead><tr><th>Address</th><th>Role</th><th>Latency</th><th>Version</th><th>Active Paths</th></tr></thead>
        <tbody>${rows}</tbody></table></div>`}
    </div>`;
  }
};

Router.start();
LogPanel.init();
</script>
