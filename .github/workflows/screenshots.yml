name: Screenshots

# Captures WebUI screenshots with Playwright and opens a PR to update docs/.
# Trigger manually via workflow_dispatch, or automatically on pushes to main
# that touch the frontend source.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "ztnet-box URL to screenshot (default: starts a local instance)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  screenshots:
    name: Capture screenshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Build ztnet-box ────────────────────────────────────────────────────

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

     # - name: Cache cargo
     #   uses: actions/cache@v5
     #   with:
     #     path: |
     #       ~/.cargo/registry/index/
     #       ~/.cargo/registry/cache/
     #       ~/.cargo/git/db/
     #       target/
     #     key: screenshots-${{ hashFiles('**/Cargo.lock') }}
     #     restore-keys: screenshots-

      - name: Build release binary
        run: cargo build --release

      # ── Start ztnet-box ────────────────────────────────────────────────────

      - name: Write minimal config
        run: |
          cat > /tmp/ztnet-box-screenshot.yml << 'EOF'
          server:
            host: "127.0.0.1"
            port: 7979
          zerotier:
            local:
              api_url: "http://127.0.0.1:9993"
              token_file: "/var/lib/zerotier-one/authtoken.secret"
            central:
              base_url: "https://my.zerotier.com"
          EOF
          
      - name: Install ZeroTier
        run: curl -s https://install.zerotier.com | sudo bash
      
      - name: Start ZeroTier (userspace, no TUN needed)
        run: |
          sudo mkdir -p /var/lib/zerotier-one
          sudo zerotier-one -U -d
          # Ждём появления authtoken
          for i in $(seq 1 20); do
             [ -f /var/lib/zerotier-one/authtoken.secret ] && \
             curl -sf http://127.0.0.1:9993/status \
          -H "X-ZT1-Auth: $(sudo cat /var/lib/zerotier-one/authtoken.secret)" \
          >/dev/null 2>&1 && break
          sleep 1
          done
          echo "ZT_TOKEN=$(sudo cat /var/lib/zerotier-one/authtoken.secret)" >> "$GITHUB_ENV"
  
     # - name: Start ztnet-box
     #   run: |
     #     ./target/release/ztnet-box --config /tmp/ztnet-box-screenshot.yml &
     #     echo "ZTNET_PID=$!" >> "$GITHUB_ENV"
     #     # Wait for server to be ready
     #     for i in $(seq 1 20); do
     #       if curl -sf http://127.0.0.1:7979/api/health >/dev/null 2>&1; then
     #         echo "ztnet-box ready after ${i}s"
     #         break
     #       fi
     #       sleep 1
     #     done

      # ── Playwright ────────────────────────────────────────────────────────

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install chromium --with-deps

      - name: Create Playwright config
        run: |
          cat > playwright.config.js << 'EOF'
          const { defineConfig } = require('@playwright/test');
          module.exports = defineConfig({
            testDir: './playwright',
            timeout: 30000,
            use: {
              baseURL: process.env.ZTNET_URL || 'http://127.0.0.1:7979',
              headless: true,
            },
          });
          EOF

      - name: Create screenshot test
        run: |
          mkdir -p playwright
          cat > playwright/screenshots.spec.js << 'SPEC'
          const { test } = require('@playwright/test');
          const path = require('path');
          const fs = require('fs');

          const BASE = process.env.ZTNET_URL || 'http://127.0.0.1:7979';

          // Pages to capture: [route, filename_prefix]
          const PAGES = [
            ['/',                      'root'],
            ['/#/dashboard',           'dashboard'],
            ['/#/networks',            'networks'],
            ['/#/exitnode',            'exitnode'],
            ['/#/physnet',             'physnet'],
            ['/#/bridge',              'bridge'],
            ['/#/relay',               'relay'],
            ['/#/controllers/networks','controllers'],
            ['/#/settings/global',     'settings-global'],
            ['/#/settings/ztnode',     'settings-ztnode'],
            ['/#/settings/tokens',     'settings-tokens'],
          ];

          const VIEWPORTS = [
            { name: 'desktop', width: 1440, height: 900 },
            { name: 'mobile',  width: 390,  height: 844 },
          ];

          const OUT_DIR = path.join(__dirname, '..', 'docs', 'screenshots');
          fs.mkdirSync(OUT_DIR, { recursive: true });

          for (const [route, prefix] of PAGES) {
            for (const vp of VIEWPORTS) {
              test(`${prefix} — ${vp.name}`, async ({ page }) => {
                await page.setViewportSize({ width: vp.width, height: vp.height });
                await page.goto(`${BASE}${route}`);
                // 1. Дождаться появления корневого контейнера страницы
                await page.waitForSelector('.page', { timeout: 8000 }).catch(() => {});
                // 2. Дождаться сетевой тишины (все API-запросы завершены)
                await page.waitForLoadState('networkidle', { timeout: 8000 }).catch(() => {});
                // 3. Дождаться исчезновения спиннеров/скелетонов
                await page.waitForSelector(
                  '.loading, .spinner, [data-loading="true"], .skeleton',
                  { state: 'hidden', timeout: 5000 }
                ).catch(() => {});
                // 4. Страховочная пауза — даёт React время завершить рендер после данных
                await page.waitForTimeout(800);
                await page.screenshot({
                  path: path.join(OUT_DIR, `${prefix}-${vp.name}.png`),
                  fullPage: false,
                });
              });
            }
          }
          SPEC

      - name: Run Playwright screenshots
        run: |
          BASE_URL="${{ github.event.inputs.base_url || 'http://127.0.0.1:7979' }}"
          ZTNET_URL="$BASE_URL" npx playwright test playwright/screenshots.spec.js \
            --reporter=line || true
        env:
          CI: "true"

      - name: Stop ztnet-box
        if: always()
        run: kill "$ZTNET_PID" 2>/dev/null || true

      # ── Commit & PR ───────────────────────────────────────────────────────

      - name: Check for changes
        id: diff
        run: |
          git add docs/screenshots/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            COUNT=$(git diff --cached --name-only | wc -l)
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit screenshots
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="chore/screenshots-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "docs(screenshots): update WebUI screenshots [skip ci]

          Captured ${{ steps.diff.outputs.count }} screenshot(s) via Playwright.
          Pages: dashboard, networks, exitnode, physnet, bridge, relay,
                 controllers, settings-global, settings-ztnode, settings-tokens
          Viewports: desktop (1440×900) + mobile (390×844)"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const body = [
              '## Updated screenshots',
              '',
              'Playwright captured fresh screenshots for all UI pages.',
              '',
              '| Page | Desktop | Mobile |',
              '|------|---------|--------|',
              ...['dashboard','networks','exitnode','physnet','bridge','relay',
                  'controllers','settings-global','settings-ztnode','settings-tokens'].map(p =>
                `| ${p} | ![](docs/screenshots/${p}-desktop.png) | ![](docs/screenshots/${p}-mobile.png) |`
              ),
              '',
              '_Auto-generated by the Screenshots workflow._',
            ].join('\n');
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title: 'docs(screenshots): update WebUI screenshots',
                head:  process.env.BRANCH,
                base:  'main',
                body,
                draft: false,
              });
              core.info(`Opened PR #${pr.number}: ${pr.html_url}`);
            } catch (err) {
              if (err.status === 403) {
                core.warning(
                  `Could not create PR automatically (403). ` +
                  `Enable "Allow GitHub Actions to create and approve pull requests" in ` +
                  `Settings → Actions → General → Workflow permissions. ` +
                  `Branch with screenshots is ready: ${process.env.BRANCH}`
                );
              } else {
                throw err;
              }
            }

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "Screenshots unchanged — no PR needed."
