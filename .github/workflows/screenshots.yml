name: Screenshots

# Captures WebUI screenshots with Playwright and opens a PR to update docs/.
# Trigger manually via workflow_dispatch only.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "ztnet-box URL (leave empty to build and start a local instance)"
        required: false
        default: ""

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  screenshots:
    name: Capture screenshots
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Build ztnet-box ────────────────────────────────────────────────────

      - name: Install Rust stable
        if: ${{ github.event.inputs.base_url == '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: ${{ github.event.inputs.base_url == '' }}
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: screenshots-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: screenshots-

      - name: Build release binary
        if: ${{ github.event.inputs.base_url == '' }}
        run: cargo build --release

      # ── Install & start ZeroTier daemon ───────────────────────────────────
      # Without a running zerotier-one all /api/local/* calls return errors
      # and every page stays in "Loading…" — screenshots are useless.
      # -U flag = userspace networking, no TUN device required in CI.

      - name: Install ZeroTier
        if: ${{ github.event.inputs.base_url == '' }}
        run: curl -s https://install.zerotier.com | sudo bash

      - name: Start ZeroTier (userspace, no TUN needed)
        if: ${{ github.event.inputs.base_url == '' }}
        run: |
          # Stop systemd service if installed, we'll run in userspace mode
          sudo systemctl stop zerotier-one 2>/dev/null || true
          sudo systemctl disable zerotier-one 2>/dev/null || true
          sudo mkdir -p /var/lib/zerotier-one
          # Start in userspace mode (no TUN/TAP required)
          sudo zerotier-one -U -d
          # Wait for authtoken and API to be ready
          echo "Waiting for ZeroTier daemon…"
          for i in $(seq 1 30); do
            if [ -f /var/lib/zerotier-one/authtoken.secret ]; then
              TOKEN=$(sudo cat /var/lib/zerotier-one/authtoken.secret)
              if curl -sf http://127.0.0.1:9993/status \
                   -H "X-ZT1-Auth: ${TOKEN}" >/dev/null 2>&1; then
                echo "ZeroTier ready after ${i}s"
                break
              fi
            fi
            sleep 1
          done
          echo "ZT_TOKEN=$(sudo cat /var/lib/zerotier-one/authtoken.secret)" >> "$GITHUB_ENV"

      # ── Start ztnet-box ────────────────────────────────────────────────────

      - name: Write config
        if: ${{ github.event.inputs.base_url == '' }}
        run: |
          cat > /tmp/ztnet-box-screenshot.yml << 'EOF'
          server:
            host: "127.0.0.1"
            port: 7979
          zerotier:
            local:
              api_url: "http://127.0.0.1:9993"
              token_file: "/var/lib/zerotier-one/authtoken.secret"
            central:
              base_url: "https://my.zerotier.com"
          EOF

      - name: Start ztnet-box
        if: ${{ github.event.inputs.base_url == '' }}
        run: |
          # sudo required: reads /var/lib/zerotier-one/authtoken.secret (root-owned)
          # ZTNET_SKIP_DEPS=1: ZeroTier is already running (started above);
          # skip the startup dep-check so deps::ensure() doesn't restart the daemon.
          sudo ZTNET_SKIP_DEPS=1 ./target/release/ztnet-box \
            --config /tmp/ztnet-box-screenshot.yml > /tmp/ztnet-box.log 2>&1 &
          echo "ZTNET_PID=$!" >> "$GITHUB_ENV"
          echo "ZTNET_URL=http://127.0.0.1:7979" >> "$GITHUB_ENV"
          # Wait for health endpoint — fail loudly if server never starts
          echo "Waiting for ztnet-box…"
          READY=0
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:7979/api/health >/dev/null 2>&1; then
              echo "ztnet-box ready after ${i}s"
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" = "0" ]; then
            echo "ERROR: ztnet-box did not start within 60s"
            echo "--- ztnet-box stderr ---"
            sudo journalctl -u ztnet-box 2>/dev/null | tail -20 || true
            echo "--- process list ---"
            ps aux | grep ztnet || true
            exit 1
          fi

      - name: Use external base_url
        if: ${{ github.event.inputs.base_url != '' }}
        run: echo "ZTNET_URL=${{ github.event.inputs.base_url }}" >> "$GITHUB_ENV"

      # ── Playwright ────────────────────────────────────────────────────────

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install Playwright
        run: |
          npm init -y
          npm install --save-dev @playwright/test
          npx playwright install chromium --with-deps

      - name: Create Playwright config
        run: |
          cat > playwright.config.js << 'EOF'
          const { defineConfig } = require('@playwright/test');
          module.exports = defineConfig({
            testDir: './playwright',
            timeout: 45000,
            use: {
              baseURL: process.env.ZTNET_URL || 'http://127.0.0.1:7979',
              headless: true,
            },
          });
          EOF

      - name: Create screenshot spec
        run: |
          mkdir -p playwright
          cat > playwright/screenshots.spec.js << 'SPEC'
          const { test } = require('@playwright/test');
          const path = require('path');
          const fs   = require('fs');

          const BASE    = process.env.ZTNET_URL || 'http://127.0.0.1:7979';
          const OUT_DIR = path.join(__dirname, '..', 'docs', 'screenshots');
          fs.mkdirSync(OUT_DIR, { recursive: true });

          // [hash-route, file-prefix]
          // '/' omitted — SPA redirects to #/dashboard, screenshot would be identical.
          const PAGES = [
            ['/#/dashboard',            'dashboard'],
            ['/#/networks',             'networks'],
            ['/#/exitnode',             'exitnode'],
            ['/#/physnet',              'physnet'],
            ['/#/bridge',               'bridge'],
            ['/#/relay',                'relay'],
            ['/#/controllers/networks', 'controllers'],
            ['/#/settings/global',      'settings-global'],
            ['/#/settings/ztnode',      'settings-ztnode'],
            ['/#/settings/tokens',      'settings-tokens'],
            ['/#/settings/roots',       'root'],
          ];

          const VIEWPORTS = [
            { name: 'desktop', width: 1440, height: 900 },
            { name: 'mobile',  width: 390,  height: 844 },
          ];

          for (const [route, prefix] of PAGES) {
            for (const vp of VIEWPORTS) {
              test(`${prefix} — ${vp.name}`, async ({ page }) => {
                await page.setViewportSize({ width: vp.width, height: vp.height });

                // Navigate; domcontentloaded fires as soon as HTML is parsed,
                // before JS runs — correct for SPAs.
                await page.goto(`${BASE}${route}`, {
                  waitUntil: 'domcontentloaded',
                  timeout: 15000,  // fail fast if server unreachable
                });

                // Wait for the SPA router to replace the initial loading shell.
                // The shell contains <div class="page"><div class="loading-row">.
                // Once the router runs and renders real content, loading-row is gone.
                // Timeout 8 s — resolves immediately on fast API, degrades gracefully.
                await page.waitForFunction(() => {
                  const content = document.getElementById('content');
                  if (!content) return false;
                  const row = content.querySelector('.loading-row');
                  return !row || row.offsetParent === null;
                }, { timeout: 8000 }).catch(() => {});

                // DO NOT use networkidle here — the dashboard runs setInterval(10s)
                // which keeps the network perpetually "busy" and networkidle never
                // resolves, causing the test to hang until the 60 s timeout.
                // Instead: fixed 2 s pause — enough for initial XHRs to complete
                // and DOM to repaint after data arrives.
                await page.waitForTimeout(2000);

                // Mobile: ensure sidebar is closed before screenshot.
                if (vp.name === 'mobile') {
                  await page.evaluate(() => {
                    document.getElementById('sidebar')?.classList.remove('open');
                    document.getElementById('sidebar-overlay')?.classList.remove('visible');
                  });
                  await page.waitForTimeout(300); // CSS transition 200 ms + margin
                }

                await page.screenshot({
                  path: path.join(OUT_DIR, `${prefix}-${vp.name}.png`),
                  fullPage: false,
                });
              });
            }
          }
          SPEC

      - name: Verify server before Playwright
        if: ${{ github.event.inputs.base_url == '' }}
        run: |
          echo "=== ztnet-box health check ==="
          curl -sv http://127.0.0.1:7979/api/health 2>&1 | head -30
          echo ""
          echo "=== ztnet-box process ==="
          ps aux | grep ztnet || echo "ztnet-box not in ps!"
          echo ""
          echo "=== ztnet-box log (last 30 lines) ==="
          tail -30 /tmp/ztnet-box.log 2>/dev/null || echo "(no log file)"

      - name: Run Playwright screenshots
        run: |
          ZTNET_URL="${{ env.ZTNET_URL }}" \
          npx playwright test playwright/screenshots.spec.js \
            --reporter=line \
            --workers=1 || true
        env:
          CI: "true"

      - name: Show ztnet-box log on failure
        if: failure()
        run: |
          echo "=== ztnet-box stdout/stderr ==="
          cat /tmp/ztnet-box.log 2>/dev/null || echo "(no log)"

      - name: Stop ztnet-box
        if: always() && env.ZTNET_PID != ''
        run: sudo kill "${{ env.ZTNET_PID }}" 2>/dev/null || true

      # ── Commit & PR ───────────────────────────────────────────────────────

      - name: Check for changes
        id: diff
        run: |
          git add docs/screenshots/
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            COUNT=$(git diff --cached --name-only | wc -l | tr -d ' ')
            echo "count=${COUNT}" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit screenshots
        if: steps.diff.outputs.changed == 'true'
        run: |
          BRANCH="chore/screenshots-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "docs(screenshots): update WebUI screenshots [skip ci]

          Captured ${{ steps.diff.outputs.count }} screenshot(s) via Playwright.
          Pages: dashboard, networks, exitnode, physnet, bridge, relay,
                 controllers, settings-global, settings-ztnode, settings-tokens, root
          Viewports: desktop (1440×900) + mobile (390×844)"
          git push origin "$BRANCH"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      - name: Open PR
        if: steps.diff.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pages = [
              'dashboard','networks','exitnode','physnet','bridge','relay',
              'controllers','settings-global','settings-ztnode','settings-tokens','root'
            ];
            const body = [
              '## Updated screenshots',
              '',
              'Playwright captured fresh screenshots for all UI pages.',
              '',
              '| Page | Desktop | Mobile |',
              '|------|---------|--------|',
              ...pages.map(p =>
                `| ${p} | ![](docs/screenshots/${p}-desktop.png) | ![](docs/screenshots/${p}-mobile.png) |`
              ),
              '',
              '_Auto-generated by the Screenshots workflow._',
            ].join('\n');
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                title: 'docs(screenshots): update WebUI screenshots',
                head:  process.env.BRANCH,
                base:  'main',
                body,
                draft: false,
              });
              core.info(`Opened PR #${pr.number}: ${pr.html_url}`);
            } catch (err) {
              if (err.status === 403) {
                core.warning(
                  `Could not create PR automatically (403). ` +
                  `Enable "Allow GitHub Actions to create and approve pull requests" in ` +
                  `Settings → Actions → General → Workflow permissions. ` +
                  `Branch with screenshots is ready: ${process.env.BRANCH}`
                );
              } else {
                throw err;
              }
            }

      - name: No changes
        if: steps.diff.outputs.changed == 'false'
        run: echo "Screenshots unchanged — no PR needed."
