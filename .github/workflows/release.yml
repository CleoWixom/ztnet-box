name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: ztnet-box

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARTIFACT="${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.target }}"
          mkdir -p "dist/${ARTIFACT}"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}" "dist/${ARTIFACT}/"
          cp config.yml.example "dist/${ARTIFACT}/"
          cp README.md CHANGELOG.md "dist/${ARTIFACT}/"
          tar -czf "dist/${ARTIFACT}.tar.gz" -C dist "${ARTIFACT}"
          echo "ARTIFACT_PATH=dist/${ARTIFACT}.tar.gz" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT}.tar.gz"      >> "$GITHUB_ENV"

      - name: Prepare artifact (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $ARTIFACT = "${{ env.BINARY_NAME }}-${VERSION}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "dist\${ARTIFACT}"
          Copy-Item "target\${{ matrix.target }}\release\${{ env.BINARY_NAME }}.exe" "dist\${ARTIFACT}\"
          Copy-Item "config.yml.example", "README.md", "CHANGELOG.md" "dist\${ARTIFACT}\"
          Compress-Archive -Path "dist\${ARTIFACT}" -DestinationPath "dist\${ARTIFACT}.zip"
          echo "ARTIFACT_PATH=dist/${ARTIFACT}.zip" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "ARTIFACT_NAME=${ARTIFACT}.zip"      | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Извлечь секцию текущей версии из CHANGELOG.md
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See CHANGELOG.md for details."
          fi
          # Сохранить в файл (избегаем проблем с многострочным output)
          echo "$NOTES" > release_notes.md
          echo "notes_file=release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          body_path: ${{ steps.changelog.outputs.notes_file }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
          token: ${{ secrets.GITHUB_TOKEN }}
