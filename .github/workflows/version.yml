name: Version

on:
  push:
    branches: ["main"]
    paths:
      - "src/**"
      - "www/**"
      - "tests/**"
      - "build.rs"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: write

jobs:
  bump:
    name: Bump Version & Tag
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      bumped: ${{ steps.bump.outputs.bumped }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump
        id: bump
        run: |
          # Получить коммиты с последнего тега
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --format="%s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --format="%s")
          fi

          echo "Commits since last tag:"
          echo "$COMMITS"

          # Определить тип bump по Conventional Commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qE "^BREAKING CHANGE:|^[a-z]+(\([^)]+\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\([^)]+\))?:"; then
            BUMP="minor"
          fi

          echo "Bump type: $BUMP"

          # Прочитать текущую версию из Cargo.toml
          # Regex устойчив к пробелам вокруг '=': version[ ]*=[ ]*"x.y.z"
          CURRENT=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed -E 's/version[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/')
          echo "Current version: $CURRENT"

          if [ -z "$CURRENT" ]; then
            echo "ERROR: could not extract version from Cargo.toml"
            exit 1
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # FIX: используем $(( )) арифметику, не ${VAR+N}
          case "$BUMP" in
            major) NEW="$((MAJOR+1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR+1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH+1))" ;;
          esac

          echo "New version: $NEW"

          # Не бампить если последний коммит уже является bump-коммитом
          LAST_COMMIT_MSG=$(git log -1 --format="%s")
          if echo "$LAST_COMMIT_MSG" | grep -q "^chore(release):"; then
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Проверить что тег ещё не существует
          if git tag | grep -q "^v${NEW}$"; then
            echo "Tag v${NEW} already exists, skipping"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "new_version=$NEW" >> "$GITHUB_OUTPUT"
          echo "bumped=true"      >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml version
        if: steps.bump.outputs.bumped == 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          # Устойчивый sed: матчит version с любым количеством пробелов вокруг '='
          sed -i -E "0,/^version[[:space:]]*=/{s/^version[[:space:]]*=[[:space:]]*\"[^\"]+\"/version = \"${NEW_VERSION}\"/}" Cargo.toml
          echo "Updated Cargo.toml to version ${NEW_VERSION}"
          grep '^version' Cargo.toml | head -1

      - name: Update CHANGELOG.md
        if: steps.bump.outputs.bumped == 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          DATE=$(date +%Y-%m-%d)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          # Собрать список изменений по секциям
          if [ -z "$LAST_TAG" ]; then
            LOG=$(git log --format="%s|%h" HEAD)
          else
            LOG=$(git log --format="%s|%h" "${LAST_TAG}..HEAD~1")
          fi

          BREAKING=""
          FEATURES=""
          FIXES=""
          CHORES=""

          while IFS='|' read -r MSG HASH; do
            [ -z "$MSG" ] && continue
            if echo "$MSG" | grep -qE "^BREAKING CHANGE:|^[a-z]+!:"; then
              BREAKING="${BREAKING}\n- ${MSG} (${HASH})"
            elif echo "$MSG" | grep -qE "^feat(\([^)]+\))?:"; then
              CLEAN=$(echo "$MSG" | sed -E 's/^feat\([^)]*\): //' | sed 's/^feat: //')
              FEATURES="${FEATURES}\n- ${CLEAN} (${HASH})"
            elif echo "$MSG" | grep -qE "^fix(\([^)]+\))?:"; then
              CLEAN=$(echo "$MSG" | sed -E 's/^fix\([^)]*\): //' | sed 's/^fix: //')
              FIXES="${FIXES}\n- ${CLEAN} (${HASH})"
            else
              CHORES="${CHORES}\n- ${MSG} (${HASH})"
            fi
          done <<< "$LOG"

          # Использовать Python для вставки в CHANGELOG (надёжнее bash heredoc)
          python3 - "$NEW_VERSION" "$DATE" "$BREAKING" "$FEATURES" "$FIXES" "$CHORES" << 'PYEOF'
          import sys, re

          new_version = sys.argv[1]
          date        = sys.argv[2]
          breaking    = sys.argv[3].replace('\\n', '\n').strip()
          features    = sys.argv[4].replace('\\n', '\n').strip()
          fixes       = sys.argv[5].replace('\\n', '\n').strip()
          chores      = sys.argv[6].replace('\\n', '\n').strip()

          section = f"## [{new_version}] — {date}"
          if breaking: section += f"\n\n### ⚠ Breaking Changes\n{breaking}"
          if features: section += f"\n\n### Features\n{features}"
          if fixes:    section += f"\n\n### Bug Fixes\n{fixes}"
          if chores:   section += f"\n\n### Chores\n{chores}"

          with open("CHANGELOG.md", "r") as f:
              content = f.read()

          if "## [Unreleased]" in content:
              new_content = re.sub(
                  r"(## \[Unreleased\][^\n]*\n)",
                  r"\1\n" + section + "\n\n",
                  content,
                  count=1,
              )
          else:
              new_content = section + "\n\n" + content

          with open("CHANGELOG.md", "w") as f:
              f.write(new_content)

          print(f"CHANGELOG.md updated with {new_version}")
          PYEOF

      - name: Commit, tag and push
        if: steps.bump.outputs.bumped == 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git add Cargo.toml CHANGELOG.md
          git commit -m "chore(release): v${NEW_VERSION} [skip ci]"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin main
          git push origin "v${NEW_VERSION}"
