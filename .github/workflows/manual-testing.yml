name: Manual WebUI Testing

# Starts ztnet-box on the runner and exposes it via tunnel.
# The public URL appears in the "Start tunnel" step logs.
# Runner stays alive until timeout (default 60 min) or manual cancellation.

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "ztnet-box URL (leave empty to build and start a local instance)"
        required: false
        default: ""
      tunnel:
        description: "Tunnel provider"
        required: true
        default: "cloudflared"
        type: choice
        options:
          - cloudflared
          - localtunnel
      port:
        description: "Port for ztnet-box (default: 7979)"
        required: false
        default: "7979"
      timeout_minutes:
        description: "How long to keep the session alive (minutes, max 350)"
        required: false
        default: "60"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  manual-testing:
    name: Manual WebUI Testing (${{ inputs.tunnel }})
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      # ── Build ztnet-box (skipped when base_url is provided) ──────────────

      - name: Install Rust stable
        if: ${{ github.event.inputs.base_url == '' }}
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: ${{ github.event.inputs.base_url == '' }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: manual-testing-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: manual-testing-

      - name: Build release binary
        if: ${{ github.event.inputs.base_url == '' }}
        run: cargo build --release

      # ── ZeroTier (skipped when base_url is provided) ─────────────────────

      - name: Install ZeroTier
        if: ${{ github.event.inputs.base_url == '' }}
        run: curl -s https://install.zerotier.com | sudo bash

      - name: Start ZeroTier daemon
        if: ${{ github.event.inputs.base_url == '' }}
        run: |
          sudo systemctl stop zerotier-one 2>/dev/null || true
          sudo systemctl disable zerotier-one 2>/dev/null || true
          sudo mkdir -p /var/lib/zerotier-one
          # Userspace mode: no TUN/TAP device needed in CI
          sudo zerotier-one -U -d

          echo "Waiting for ZeroTier daemon…"
          READY=0
          for i in $(seq 1 30); do
            if [ -f /var/lib/zerotier-one/authtoken.secret ]; then
              TOKEN=$(sudo cat /var/lib/zerotier-one/authtoken.secret)
              if curl -sf http://127.0.0.1:9993/status \
                   -H "X-ZT1-Auth: ${TOKEN}" >/dev/null 2>&1; then
                echo "ZeroTier ready after ${i}s"
                # Make authtoken readable by runner user (non-root)
                sudo chmod 644 /var/lib/zerotier-one/authtoken.secret
                # Make ZT socket accessible for zerotier-cli
                sudo chmod 666 /var/lib/zerotier-one/zerotier-one.sock 2>/dev/null || true
                # Copy token to /tmp so ztnet-box config can reference it without sudo
                cp /var/lib/zerotier-one/authtoken.secret /tmp/zt-authtoken.secret
                READY=1
                break
              fi
            fi
            sleep 1
          done
          if [ "$READY" = "0" ]; then
            echo "ERROR: ZeroTier not ready after 30s"
            sudo journalctl -u zerotier-one --no-pager -n 30 2>/dev/null || true
            exit 1
          fi

      # ── Config & start ztnet-box (skipped when base_url is provided) ─────

      - name: Write config
        if: ${{ github.event.inputs.base_url == '' }}
        run: |
          PORT="${{ inputs.port }}"
          # Use the repo's example config as the base — stays in sync with the schema.
          cp config.yml.example /tmp/ztnet-box-manual.yml
          # Override only the values that differ from defaults for CI use.
          sed -i "s/port: 3000/port: ${PORT}/"                                              /tmp/ztnet-box-manual.yml
          sed -i 's|token_file:.*authtoken.*|token_file: "/tmp/zt-authtoken.secret"|'       /tmp/ztnet-box-manual.yml
          sed -i 's/enabled: true/enabled: false/'                                           /tmp/ztnet-box-manual.yml
          echo "Config written:"; cat /tmp/ztnet-box-manual.yml

      - name: Start ztnet-box
        if: ${{ github.event.inputs.base_url == '' }}
        env:
          # Skip built-in deps::ensure() — ZT daemon managed by previous step
          ZTNET_SKIP_DEPS: "1"
        run: |
          PORT="${{ inputs.port }}"
          ./target/release/ztnet-box --config /tmp/ztnet-box-manual.yml \
            > /tmp/ztnet-box.log 2>&1 &
          ZTNET_PID=$!
          echo "ZTNET_PID=${ZTNET_PID}" >> "$GITHUB_ENV"
          echo "ZTNET_URL=http://127.0.0.1:${PORT}" >> "$GITHUB_ENV"

          echo "Waiting for ztnet-box…"
          READY=0
          for i in $(seq 1 30); do
            if curl -sf "http://127.0.0.1:${PORT}/api/health" >/dev/null 2>&1; then
              echo "ztnet-box ready after ${i}s"
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" = "0" ]; then
            echo "ERROR: ztnet-box did not start within 30s"
            echo "--- ztnet-box log ---"
            cat /tmp/ztnet-box.log
            exit 1
          fi

      - name: Use external base_url
        if: ${{ github.event.inputs.base_url != '' }}
        run: echo "ZTNET_URL=${{ github.event.inputs.base_url }}" >> "$GITHUB_ENV"

      # ── Tunnel ──────────────────────────────────────────────────────────

      - name: Install Node.js (localtunnel)
        if: inputs.tunnel == 'localtunnel'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install localtunnel
        if: inputs.tunnel == 'localtunnel'
        run: npm install -g localtunnel

      - name: Install cloudflared
        if: inputs.tunnel == 'cloudflared'
        run: |
          curl -fsSL \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb
          cloudflared version

      - name: Start tunnel & keep session alive
        id: tunnel
        run: |
          PORT="${{ inputs.port }}"
          TUNNEL="${{ inputs.tunnel }}"
          TIMEOUT_MIN="${{ inputs.timeout_minutes }}"
          TIMEOUT_SEC=$(( TIMEOUT_MIN * 60 ))

          # ── Start tunnel ────────────────────────────────────────────────
          if [ "$TUNNEL" = "localtunnel" ]; then
            lt --port "$PORT" > /tmp/tunnel.log 2>&1 &
            TUNNEL_PID=$!

            echo "Waiting for localtunnel URL…"
            for i in $(seq 1 30); do
              URL=$(grep -oP 'https://[a-zA-Z0-9\-]+\.loca\.lt' /tmp/tunnel.log | head -1)
              [ -n "$URL" ] && break
              sleep 1
            done

          elif [ "$TUNNEL" = "cloudflared" ]; then
            # --protocol http2: avoids QUIC probe failures on cold CI runners.
            # Separate log files: JSON to tunnel.log, human-readable to tunnel-stderr.log.
            cloudflared tunnel --url "http://127.0.0.1:$PORT" \
              --no-autoupdate \
              --protocol http2 \
              --logfile /tmp/tunnel.log \
              --loglevel info >/dev/null 2>/tmp/tunnel-stderr.log &
            TUNNEL_PID=$!

            echo "Waiting for cloudflared URL…"
            # trycloudflare.com tunnels can take up to 90s on a cold runner
            for i in $(seq 1 90); do
              URL=$(grep -oE 'https://[a-zA-Z0-9-]+\.trycloudflare\.com' \
                      /tmp/tunnel.log /tmp/tunnel-stderr.log 2>/dev/null | head -1)
              [ -n "$URL" ] && break
              sleep 1
            done
          fi

          echo "TUNNEL_PID=${TUNNEL_PID}" >> "$GITHUB_ENV"

          if [ -z "$URL" ]; then
            echo "ERROR: could not get tunnel URL after 90s"
            echo "--- Tunnel log ---"
            cat /tmp/tunnel.log
            exit 1
          fi

          echo "url=${URL}" >> "$GITHUB_OUTPUT"

          echo ""
          echo "════════════════════════════════════════════════════════"
          echo "  ztnet-box WebUI is live:"
          echo ""
          echo "  ${URL}"
          echo ""
          echo "  Session timeout : ${TIMEOUT_MIN} min"
          echo "  Stop early      : Cancel this workflow run"
          echo "════════════════════════════════════════════════════════"
          echo ""

          # ── Keep runner alive ───────────────────────────────────────────
          ELAPSED=0
          INTERVAL=30
          while [ "$ELAPSED" -lt "$TIMEOUT_SEC" ]; do
            sleep "$INTERVAL"
            ELAPSED=$(( ELAPSED + INTERVAL ))
            REMAINING=$(( (TIMEOUT_SEC - ELAPSED) / 60 ))
            echo "[$(date -u '+%H:%M:%S')] Alive — ${REMAINING} min remaining | ${URL}"

            # Verify ztnet-box is still running (only when we started it)
            if [ -n "$ZTNET_PID" ] && ! kill -0 "$ZTNET_PID" 2>/dev/null; then
              echo "ERROR: ztnet-box process died"
              echo "--- ztnet-box log ---"
              cat /tmp/ztnet-box.log
              exit 1
            fi
          done

          echo "Session timeout reached (${TIMEOUT_MIN} min). Shutting down."

      # ── Cleanup ─────────────────────────────────────────────────────────

      - name: Stop tunnel & ztnet-box
        if: always()
        run: |
          [ -n "$TUNNEL_PID" ] && kill "$TUNNEL_PID" 2>/dev/null || true
          [ -n "$ZTNET_PID"  ] && kill "$ZTNET_PID"  2>/dev/null || true

      - name: Dump ztnet-box log
        if: always()
        run: cat /tmp/ztnet-box.log 2>/dev/null || true

      - name: Dump tunnel log
        if: always()
        run: |
          echo "=== tunnel.log ===" && cat /tmp/tunnel.log 2>/dev/null || true
          echo "=== tunnel-stderr.log ===" && cat /tmp/tunnel-stderr.log 2>/dev/null || true
